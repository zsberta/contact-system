<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tab icon — single fallback to /logo.svg (the only asset under /public) -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- Default tab title — neutral brand-only string. Per-route <SEO /> calls
         override this at runtime. The <html lang> is also overridden by <SEO />. -->
    <title>BuzzCRM</title>

    <!-- Primary Meta Tags -->
    <meta name="title" content="BuzzCRM" />
    <meta
      name="description"
      content="BuzzCRM - Adminisztrációs Rendszer / Contact Management System"
    />
    <meta name="author" content="Webbees" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BuzzCRM" />
    <meta
      property="og:description"
      content="BuzzCRM - Adminisztrációs Rendszer / Contact Management System"
    />
    <meta property="og:image" content="/logo.svg" />
    <meta property="og:site_name" content="BuzzCRM" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BuzzCRM" />
    <meta
      name="twitter:description"
      content="BuzzCRM - Adminisztrációs Rendszer / Contact Management System"
    />
    <meta name="twitter:image" content="/logo.svg" />

    <!-- Theme Color — brand green, matches favicon/logo SVG (#22CE83) -->
    <meta name="theme-color" content="#22CE83" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
